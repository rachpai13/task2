<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CityRun — Shadow Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050507;
    --surface: #0d0d10;
    --surface2: #13131a;
    --border: #1e1e28;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --danger: #ff3b3b;
    --danger-dim: rgba(255,59,59,0.12);
    --text: #e8e8f0;
    --text-muted: #44445a;
    --text-sub: #888899;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --display: 'Bebas Neue', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow: hidden;
    touch-action: none;
    font-weight: 300;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,240,96,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,96,0.018) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .screen {
    display: none;
    min-height: 100vh;
    padding: 24px 20px 100px;
    animation: rise 0.5s cubic-bezier(0.16,1,0.3,1);
    text-align: center;
    overflow-y: auto;
    position: relative;
    z-index: 1;
  }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-family: var(--display);
    font-size: 3.4rem;
    letter-spacing: 6px;
    margin-bottom: 4px;
    color: var(--text);
    text-transform: uppercase;
  }
  .logo span { color: var(--accent); }

  .logo-sub {
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 4px;
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 400px;
    position: relative;
  }

  .hero-msg {
    font-size: 1rem;
    line-height: 1.6;
    color: var(--text-sub);
    margin-bottom: 24px;
    text-align: left;
    padding: 18px;
    background: var(--danger-dim);
    border-radius: 10px;
    border-left: 3px solid var(--danger);
  }

  .gender-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 22px;
  }
  .gender-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 10px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: var(--sans);
    font-size: 1rem;
    transition: all 0.2s ease;
  }
  .gender-btn.selected {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: rgba(200,240,96,0.35);
  }

  .input-group { margin-bottom: 16px; text-align: left; }
  .input-group label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-family: var(--mono);
  }
  .input-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 1.1rem;
    outline: none;
  }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #0a0d02;
    border: none;
    border-radius: 10px;
    padding: 18px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 1rem;
  }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

  .timer-box { display: flex; gap: 12px; margin-bottom: 24px; }
  .timer-segment {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    flex: 1;
  }
  .seg-label { font-family: var(--mono); font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; }
  .seg-value { font-family: var(--display); font-size: 2.5rem; color: var(--text); }

  .btn-chase {
    display: none;
    background: var(--danger-dim);
    color: var(--danger);
    border: 1px solid rgba(255,59,59,0.3);
    padding: 18px;
    border-radius: 12px;
    width: 100%;
    font-family: var(--sans);
    cursor: pointer;
    animation: pulse 1.5s infinite;
    margin-bottom: 12px;
  }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
  .btn-chase.show { display: block; }

  .alt-options {
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }
  .alt-options.show { display: flex; }

  .btn-alt {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-sub);
    padding: 12px;
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: var(--mono);
    text-transform: uppercase;
  }

  .home-link {
    margin-top: 24px;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-muted);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 4px;
  }

  #gStatus {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  canvas { border: 1px solid var(--border); border-radius: 8px; background: #03030a; margin-bottom: 20px; }

  .bottom-nav {
    position: fixed;
    bottom: 0; width: 100%;
    background: var(--surface);
    display: flex; justify-content: space-around;
    padding: 15px; border-top: 1px solid var(--border);
    transform: translateY(100%); transition: transform 0.4s ease;
  }
  .bottom-nav.show { transform: translateY(0); }
  .nav-val { font-family: var(--display); font-size: 1.8rem; color: var(--accent); display: block; }
  .nav-lbl { font-family: var(--mono); font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
</style>
</head>
<body>

<div id="onboardScreen" class="screen active">
  <div class="logo">CITY<span>RUN</span></div>
  <div class="logo-sub">Shadow Protocol</div>
  <div class="card">
    <div class="hero-msg">
      This is a pure city. Women whose cycles are active are hunted by sensory authorities. 
      Stay below the radar.
    </div>
    <div class="gender-row">
      <button class="gender-btn" onclick="setGender('male')" id="mBtn">♂ male</button>
      <button class="gender-btn" onclick="setGender('female')" id="fBtn">♀ female</button>
    </div>
    <div class="input-group">
      <label>how old are you?</label>
      <input type="number" id="ageIn" placeholder="—" oninput="checkForm()">
    </div>
    <div id="pSec" class="input-group" style="display:none;">
      <label>cycle start day</label>
      <input type="number" id="pIn" placeholder="day of month" oninput="checkForm()">
    </div>
    <button class="btn-primary" id="startBtn" onclick="processStart()" disabled>initiate run</button>
  </div>
</div>

<div id="statusMsgScreen" class="screen">
  <div class="card">
    <div id="statusText" style="text-align:left; line-height:1.6; margin-bottom:20px;"></div>
    <button class="btn-primary" id="continueBtn" onclick="proceedFromStatus()">continue</button>
    <div class="home-link" onclick="goHome()">RETURN TO TERMINAL</div>
  </div>
</div>

<div id="dashScreen" class="screen">
  <div class="card">
    <div id="safeStatus" style="color:var(--accent); font-family:var(--mono); font-size:0.8rem; margin-bottom:15px;"></div>
    <div class="timer-box">
      <div class="timer-segment">
        <div class="seg-label">month</div>
        <span class="seg-value" id="dispM">JAN</span>
      </div>
      <div class="timer-segment">
        <div class="seg-label">day</div>
        <span class="seg-value" id="dispD">01</span>
      </div>
    </div>
    <button class="btn-chase" id="chaseBtn" onclick="openGame()">
      SENSORS DETECTED: DEACTIVATE E-NOSE NODES
    </button>
    <div class="alt-options" id="altContainer">
        <button class="btn-alt" onclick="handleAlt('underground')">surrender & go to underground city</button>
        <button class="btn-alt" onclick="handleAlt('leave')">quit and leave the city</button>
    </div>
    <div class="home-link" onclick="goHome()">RETURN TO TERMINAL</div>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div id="gStatus">initializing...</div>
  <canvas id="gameCanvas"></canvas>
  <div class="home-link" onclick="goHome()">RETURN TO TERMINAL</div>
</div>

<div class="bottom-nav" id="bNav">
  <div class="nav-item"><span class="nav-val" id="navM">JAN</span><span class="nav-lbl">Month</span></div>
  <div class="nav-item"><span class="nav-val" id="navS">0</span><span class="nav-lbl">Escaped</span></div>
</div>

<script>
let user = { gender:null, age:null, cycleDay:15, currentM:0, survived:0 };
const SHORT = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const gridSize = 6;
let cellSize, path = [], targets = [], dragging = false, animId;
let authority = { x: 5, y: 5, speed: 0.022 };
let timerInterval;

function setGender(g) {
  user.gender = g;
  document.getElementById('mBtn').classList.toggle('selected', g==='male');
  document.getElementById('fBtn').classList.toggle('selected', g==='female');
  document.getElementById('pSec').style.display = g==='female' ? 'block' : 'none';
  checkForm();
}

function checkForm() {
  const age = document.getElementById('ageIn').value;
  const cycle = document.getElementById('pIn').value;
  document.getElementById('startBtn').disabled = user.gender === 'female' ? !(age && cycle) : !age;
}

function processStart() {
  user.age = parseInt(document.getElementById('ageIn').value);
  user.cycleDay = parseInt(document.getElementById('pIn').value) || 15;
  const st = document.getElementById('statusText');
  
  if (user.gender === 'female' && user.age >= 10 && user.age <= 50) {
    st.innerText = "Authorities have deployed E-nose devices to track hormonal shifts. You must manually deactivate these nodes every month to remain invisible.";
    show('statusMsgScreen');
  } else {
    st.innerText = "You are not a target of the Shadow Protocol. You may pass freely.";
    document.getElementById('continueBtn').style.display = "none";
    show('statusMsgScreen');
  }
}

function proceedFromStatus() {
  show('dashScreen');
  document.getElementById('bNav').classList.add('show');
  startTimer();
}

function startTimer() {
  let d = 1; let m = user.currentM % 12;
  document.getElementById('dispM').innerText = SHORT[m].toUpperCase();
  document.getElementById('navM').innerText = SHORT[m].toUpperCase();
  
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    document.getElementById('dispD').innerText = String(d).padStart(2, '0');
    if(d >= user.cycleDay) {
      clearInterval(timerInterval);
      document.getElementById('chaseBtn').classList.add('show');
      document.getElementById('altContainer').classList.add('show');
      document.getElementById('safeStatus').innerText = "ALERT: DETECTION IMMINENT";
    }
    d++;
  }, 800);
}

function openGame() { 
    show('gameScreen'); 
    initGrid(true); 
}

function handleAlt(type) {
    const st = document.getElementById('statusText');
    document.getElementById('continueBtn').style.display = "none";
    if(type === 'underground') {
        st.innerText = "You have chosen sanctuary. The Shadow Protocol cannot reach the underground, but you can never return to the surface.";
    } else {
        st.innerText = "Departure protocol initiated. You are leaving the city borders. The sensory grid fades behind you.";
    }
    show('statusMsgScreen');
}

function goHome() {
    if(timerInterval) clearInterval(timerInterval);
    if(animId) cancelAnimationFrame(animId);
    document.getElementById('bNav').classList.remove('show');
    document.getElementById('chaseBtn').classList.remove('show');
    document.getElementById('altContainer').classList.remove('show');
    document.getElementById('continueBtn').style.display = "block";
    show('onboardScreen');
}

function initGrid(isNewLevel) {
  const size = Math.min(window.innerWidth - 40, 340);
  canvas.width = canvas.height = size;
  cellSize = size / gridSize;
  path = []; 
  let currentSpeed = 0.022 + (user.currentM * 0.001);
  authority = { x: 5, y: 5, speed: currentSpeed };
  updateStatusDisplay();

  if(isNewLevel || targets.length === 0) {
      targets = [];
      let cells = [];
      for(let i=0; i<gridSize; i++) for(let j=0; j<gridSize; j++) {
          if(!(i===5 && j===5)) cells.push({x:i, y:j}); 
      }
      cells.sort(() => Math.random() - 0.5);
      for(let i=0; i<8; i++) targets.push({id: i+1, x: cells[i].x, y: cells[i].y, hit: false});
  } else {
      targets.forEach(t => t.hit = false);
  }
  if(animId) cancelAnimationFrame(animId);
  gameLoop();
}

function updateStatusDisplay() {
  let hitCount = targets.filter(t => t.hit).length;
  document.getElementById('gStatus').innerText = `Month: ${SHORT[user.currentM % 12].toUpperCase()} | Nodes: ${hitCount}/8`;
}

function update() {
  let head = path.length > 0 ? path[path.length-1] : {x: 2, y: 2};
  let dx = head.x - authority.x;
  let dy = head.y - authority.y;
  let dist = Math.hypot(dx, dy);
  if(dist > 0.05) {
    authority.x += (dx/dist) * authority.speed;
    authority.y += (dy/dist) * authority.speed;
  }
  if(path.length > 0) {
    let dToA = Math.hypot(path[path.length-1].x - authority.x, path[path.length-1].y - authority.y);
    if(dToA < 0.35) {
      path = []; targets.forEach(t => t.hit = false); 
      authority.x = 5; authority.y = 5;
      document.getElementById('gStatus').innerText = "DETECTED — RETRYING GRID";
      setTimeout(updateStatusDisplay, 1000);
    }
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  for(let i=0; i<=gridSize; i++) {
    ctx.beginPath(); ctx.moveTo(i*cellSize,0); ctx.lineTo(i*cellSize,canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*cellSize); ctx.lineTo(canvas.width,i*cellSize); ctx.stroke();
  }
  if(path.length > 1) {
    ctx.strokeStyle = varColor('--accent'); ctx.lineWidth = 3; ctx.beginPath();
    path.forEach((p,i) => {
      let x = p.x*cellSize+cellSize/2, y = p.y*cellSize+cellSize/2;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();
  }
  targets.forEach(t => {
    let x = t.x*cellSize+cellSize/2, y = t.y*cellSize+cellSize/2;
    ctx.fillStyle = t.hit ? varColor('--accent') : "rgba(255,255,255,0.1)";
    ctx.beginPath(); ctx.arc(x,y,cellSize*0.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = t.hit ? "#000" : "#fff";
    ctx.font = "10px DM Mono"; ctx.textAlign="center"; ctx.fillText("e"+t.id, x, y+4);
  });
  ctx.fillStyle = varColor('--danger');
  ctx.beginPath(); ctx.arc(authority.x*cellSize+cellSize/2, authority.y*cellSize+cellSize/2, 8, 0, Math.PI*2); ctx.fill();
}

function gameLoop() { update(); draw(); animId = requestAnimationFrame(gameLoop); }

function handleInput(e) {
  if(!dragging) return;
  const rect = canvas.getBoundingClientRect();
  const tx = e.touches ? e.touches[0].clientX : e.clientX;
  const ty = e.touches ? e.touches[0].clientY : e.clientY;
  const c = { x: Math.floor((tx-rect.left)/cellSize), y: Math.floor((ty-rect.top)/cellSize) };
  if(c.x < 0 || c.x >= gridSize || c.y < 0 || c.y >= gridSize) return;
  if(path.length === 0) { path.push(c); } else {
    let last = path[path.length-1];
    if(c.x === last.x && c.y === last.y) return;
    if(Math.abs(c.x-last.x) + Math.abs(c.y-last.y) === 1) {
      if(!path.some(p => p.x===c.x && p.y===c.y)) path.push(c);
    }
  }
  let hit = targets.find(t => t.x === c.x && t.y === c.y);
  if(hit) { hit.hit = true; updateStatusDisplay(); }
  if(targets.every(t => t.hit)) {
    user.survived++; user.currentM++;
    document.getElementById('navS').innerText = user.survived;
    dragging = false;
    setTimeout(() => {
      document.getElementById('chaseBtn').classList.remove('show');
      document.getElementById('altContainer').classList.remove('show');
      document.getElementById('safeStatus').innerText = "STATUS: INVISIBLE";
      show('dashScreen'); startTimer();
    }, 400);
  }
}

function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

canvas.addEventListener('mousedown', () => dragging=true);
window.addEventListener('mousemove', handleInput);
window.addEventListener('mouseup', () => dragging=false);
canvas.addEventListener('touchstart', (e) => { dragging=true; e.preventDefault(); }, {passive:false});
window.addEventListener('touchmove', (e) => { handleInput(e); e.preventDefault(); }, {passive:false});
window.addEventListener('touchend', () => dragging=false);
</script>
</body>
</html>
